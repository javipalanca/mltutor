name: Build executables

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-x86_64
            archive: tar
          - os: windows-latest
            platform: windows-x86_64
            archive: installer
          - os: macos-latest
            platform: macos-arm64
            archive: tar

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install Qt system libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 \
            libxcb-cursor0 libnss3 libasound2 libgbm1 libxcomposite1 \
            libxdamage1 libxrandr2 libxtst6 libxss1 xvfb

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Build with PyInstaller
        run: uv run pyinstaller pyinstaller.spec --noconfirm

      - name: Check bundled libraries
        shell: bash
        run: |
          # tensorflow debe ir dentro del paquete (en Windows llega vía
          # tensorflow-intel; sin él la app de redes neuronales no funciona)
          for lib in tensorflow streamlit sklearn webview; do
            if [ ! -d "dist/mltutor/_internal/$lib" ]; then
              echo "FALTA $lib en el paquete" >&2
              exit 1
            fi
          done
          echo "Librerías críticas presentes"

      - name: Smoke test (binary starts)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          ./dist/mltutor/mltutor --server-mode 8765 &
          PID=$!
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8765 > /dev/null; then
              echo "Server responded OK"
              kill $PID
              exit 0
            fi
            sleep 2
          done
          echo "Server did not start" >&2
          kill $PID || true
          exit 1

      - name: Smoke test (binary starts, Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath "dist/mltutor/mltutor.exe" `
            -ArgumentList "--server-mode","8765" -PassThru
          $ok = $false
          for ($i = 0; $i -lt 60; $i++) {
            try {
              Invoke-WebRequest -Uri "http://127.0.0.1:8765" -UseBasicParsing -TimeoutSec 2 | Out-Null
              $ok = $true
              break
            } catch { Start-Sleep -Seconds 2 }
          }
          Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          if ($ok) { Write-Host "Server responded OK" } else { Write-Error "Server did not start"; exit 1 }

      - name: Smoke test (native window, Linux)
        if: runner.os == 'Linux'
        timeout-minutes: 10
        run: |
          export MLTUTOR_WINDOW_TIMEOUT=45
          export MLTUTOR_REQUIRE_WINDOW=1
          xvfb-run -a ./dist/mltutor/mltutor
          echo "Native window OK"

      - name: Smoke test (native window, Windows)
        if: matrix.os == 'windows-latest'
        timeout-minutes: 10
        shell: pwsh
        run: |
          $env:MLTUTOR_WINDOW_TIMEOUT = "45"
          $env:MLTUTOR_REQUIRE_WINDOW = "1"
          $p = Start-Process -FilePath "dist/mltutor/mltutor.exe" -PassThru -Wait
          if ($p.ExitCode -ne 0) {
            Write-Error "Native window test failed (exit $($p.ExitCode)). Log:"
            Get-Content "$env:USERPROFILE\.mltutor\mltutor.log" -Tail 60 -ErrorAction SilentlyContinue
            exit 1
          }
          Write-Host "Native window OK"

      - name: Package (tar.gz)
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            # En macOS se distribuye el bundle .app (doble clic nativo)
            tar -czf mltutor-${{ matrix.platform }}.tar.gz -C dist MLTutor.app
          else
            tar -czf mltutor-${{ matrix.platform }}.tar.gz -C dist mltutor
          fi

      - name: Package (Windows installer)
        if: matrix.archive == 'installer'
        shell: pwsh
        run: |
          $version = uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])"
          Write-Host "Building installer for version $version"
          iscc /DAppVersion=$version installers\windows\mltutor.iss
          if (-not (Test-Path "mltutor-windows-x86_64-setup.exe")) {
            Write-Error "Installer not generated"; exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mltutor-${{ matrix.platform }}
          path: mltutor-${{ matrix.platform }}*
          retention-days: 14

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mltutor-*.tar.gz
            mltutor-*-setup.exe
          generate_release_notes: true
